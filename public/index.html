<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Mensagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .mensagens-section {
            margin-top: 40px;
            border-top: 2px solid #eee;
            padding-top: 30px;
        }

        .mensagens-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #f5f5f5;
        }

        th {
            padding: 12px;
            text-align: left;
            color: #555;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            color: #666;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .mensagem-vazia {
            text-align: center;
            padding: 30px;
            color: #999;
            font-style: italic;
        }

        .alerta {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }

        .alerta.sucesso {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alerta.erro {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Cadastro de Mensagens</h1>

        <div id="alerta" class="alerta"></div>

        <form id="formulario">
            <div class="form-group">
                <label for="mensagem">Digite uma mensagem:</label>
                <input 
                    type="text" 
                    id="mensagem" 
                    name="mensagem" 
                    placeholder="Digite sua mensagem aqui..."
                    required
                >
            </div>
            <button type="submit">Salvar</button>
        </form>

        <div class="mensagens-section">
            <h2>Mensagens Salvas</h2>
            <div id="tabela-container">
                <div class="loading">Carregando mensagens...</div>
            </div>
        </div>
    </div>

    <script>
        const formulario = document.getElementById('formulario');
        const inputMensagem = document.getElementById('mensagem');
        const tabelaContainer = document.getElementById('tabela-container');
        const alertaDiv = document.getElementById('alerta');

        // Carregar mensagens ao iniciar
        carregarMensagens();

        // Evento de envio do formulário
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();

            const mensagem = inputMensagem.value.trim();

            if (!mensagem) {
                mostrarAlerta('Por favor, digite uma mensagem!', 'erro');
                return;
            }

            try {
                const response = await fetch('/api/mensagens', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ texto: mensagem })
                });

                if (response.ok) {
                    mostrarAlerta('Mensagem salva com sucesso!', 'sucesso');
                    inputMensagem.value = '';
                    carregarMensagens();
                } else {
                    mostrarAlerta('Erro ao salvar a mensagem!', 'erro');
                }
            } catch (erro) {
                console.error('Erro:', erro);
                mostrarAlerta('Erro ao conectar com o servidor!', 'erro');
            }
        });

        // Função para carregar mensagens
        async function carregarMensagens() {
            try {
                const response = await fetch('/api/mensagens');
                const mensagens = await response.json();

                if (mensagens.length === 0) {
                    tabelaContainer.innerHTML = '<div class="mensagem-vazia">Nenhuma mensagem salva ainda.</div>';
                } else {
                    let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Mensagem</th>
                                    <th>Data</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    mensagens.forEach((msg) => {
                        const data = new Date(msg.DataCriacao).toLocaleString('pt-BR');
                        html += `
                            <tr>
                                <td>${msg.Id}</td>
                                <td>${escapeHtml(msg.Texto)}</td>
                                <td>${data}</td>
                            </tr>
                        `;
                    });

                    html += `
                            </tbody>
                        </table>
                    `;

                    tabelaContainer.innerHTML = html;
                }
            } catch (erro) {
                console.error('Erro ao carregar mensagens:', erro);
                tabelaContainer.innerHTML = '<div class="mensagem-vazia">Erro ao carregar mensagens.</div>';
            }
        }

        // Função para mostrar alerta
        function mostrarAlerta(mensagem, tipo) {
            alertaDiv.textContent = mensagem;
            alertaDiv.className = `alerta ${tipo}`;

            setTimeout(() => {
                alertaDiv.className = 'alerta';
            }, 3000);
        }

        // Função para escapar HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Recarregar mensagens a cada 5 segundos
        setInterval(carregarMensagens, 5000);
    </script>
</body>
</html>
